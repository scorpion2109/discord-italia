<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Italia</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#0a0f1c; color:white;}
body.light { background:#f1f1f1; color:#000;}

header {display:flex; justify-content:space-between; padding:15px; background:#00000080;}
.logo {font-weight:bold;}

.user {width:40px;height:40px;border-radius:50%;background:#1f2937;cursor:pointer;overflow:hidden;}
.user img {width:100%;}

.profile-menu {
  position:absolute; top:70px; right:20px;
  width:260px; background:#0f172a;
  border-radius:15px; padding:15px;
  display:none;
}

button, select {
  width:100%; margin-top:10px; padding:8px;
  border:none; border-radius:8px;
  background:#1f2937; color:white;
  cursor:pointer;
}

button:hover {background:#00c853; color:black;}

.hero {text-align:center; padding:80px 20px;}
.stats {display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:20px;padding:20px;}
.stat {background:#111827;padding:20px;border-radius:10px;text-align:center;}
</style>
</head>

<body>

<header>
<div class="logo">🇮🇹 Discord Italia</div>

<div class="user" onclick="toggleMenu()"></div>

<div id="menu" class="profile-menu">

<div id="userHeader">
<img id="avatar" width="40">
<div>
<h4 id="username">Guest</h4>
<span id="userid"></span>
</div>
</div>

<div id="guestMenu">
<button onclick="login()">🔐 Login Discord</button>
</div>

<div id="userMenu" style="display:none;">
<button id="dashboardBtn" style="display:none;" onclick="goDashboard()">🛡️ Dashboard</button>
<button onclick="logout()">🚪 Logout</button>
</div>

<hr>

<button onclick="toggleTheme()">🌙 Tema</button>

<select onchange="setLang(this.value)">
<option value="it">🇮🇹 Italiano</option>
<option value="en">🇬🇧 English</option>
</select>

</div>

</header>

<section class="hero">
<h1>Discord Italia</h1>
<p>La community italiana definitiva</p>
</section>

<section class="stats">
<div class="stat">👤 12K Membri</div>
<div class="stat">🛡️ 30 Staff</div>
<div class="stat">💬 1M Messaggi</div>
</section>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyD-G52a43M43KpZd5kEygDkc3ehEGx1TcY",
  authDomain: "discord-italia-a6fd2.firebaseapp.com",
  projectId: "discord-italia-a6fd2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// MENU
function toggleMenu(){
  const m = document.getElementById("menu");
  m.style.display = m.style.display==="block"?"none":"block";
}

// LOGIN
function login(){
  const clientId = "1483469321970913411";
  const redirect = encodeURIComponent("https://scorpion2109.github.io/discord-italia/");

  window.location.href =
    `https://discord.com/oauth2/authorize?client_id=${clientId}&redirect_uri=${redirect}&response_type=token&scope=identify%20email`;
}

// LOGOUT
function logout(){
  localStorage.removeItem("discordUser");
  location.reload();
}

// DASHBOARD NAV
function goDashboard(){
  window.location.href = "dashboard.html";
}

// MOSTRA UTENTE
function showUser(u){
  document.getElementById("guestMenu").style.display="none";
  document.getElementById("userMenu").style.display="block";

  document.getElementById("username").innerText=u.username;
  document.getElementById("userid").innerText=u.id;

  const avatar = `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png`;

  document.getElementById("avatar").src = avatar;
  document.querySelector(".user").innerHTML = `<img src="${avatar}">`;

  // 🔥 CONTROLLO STAFF
  checkStaff(u.id);
}

// 🔥 CONTROLLO STAFF
async function checkStaff(userId){
  try{
    const doc = await db.collection("staff").doc(userId).get();

    if(doc.exists){
      document.getElementById("dashboardBtn").style.display="block";
    }
  }catch(e){
    console.error(e);
  }
}

// TEMA
function toggleTheme(){
  const t = document.body.classList.toggle("light");
  localStorage.setItem("theme", t?"light":"dark");
}

// LINGUA
function setLang(l){
  localStorage.setItem("lang", l);
}

// LOAD
window.onload = async () => {

  const hash = window.location.hash;

  // LOGIN DISCORD
  if(hash.includes("access_token")){
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get("access_token");

    const res = await fetch("https://discord.com/api/users/@me", {
      headers:{Authorization:"Bearer "+token}
    });

    const user = await res.json();

    localStorage.setItem("discordUser", JSON.stringify(user));

    // SALVA FIREBASE
    await db.collection("users").doc(user.id).set({
      username:user.username,
      avatar:user.avatar,
      id:user.id,
      email:user.email || null,
      lastLogin:new Date()
    });

    showUser(user);

    window.history.replaceState({}, document.title, "/discord-italia/");
  }

  // AUTO LOGIN
  const saved = localStorage.getItem("discordUser");
  if(saved) showUser(JSON.parse(saved));

  // TEMA
  if(localStorage.getItem("theme")==="light") toggleTheme();
};

</script>

</body>
</html>
